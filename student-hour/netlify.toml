[build]
  base    = "client"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy all /api calls to Render backend
[[redirects]]
  from   = "/api/*"
  to     = "https://student-hour.onrender.com/api/:splat"
  status = 200
  force  = true

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
